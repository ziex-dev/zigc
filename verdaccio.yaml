storage: ./.verdaccio-storage
auth:
  htpasswd:
    file: ./.verdaccio-htpasswd
    max_users: 100
uplinks: {}
packages:
  '@zigc/*':
    access: $anonymous
    publish: $anonymous
  '**':
    access: $anonymous
    publish: $anonymous
max_body_size: 500mb
log: { type: stdout, format: pretty, level: warn }
